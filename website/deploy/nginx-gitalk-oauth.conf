#   curl -v -m 15 -X POST https://github.com/login/oauth/access_token \
#        -H 'Accept: application/json' -d 'client_id=x&client_secret=x&code=x'
#   · 若服务器上这条 curl 也连不上/超时/reset → 是服务器出网到 github 的问题(上面的(2))，
