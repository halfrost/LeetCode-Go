<script>
    var html = document.documentElement;
    var stored = localStorage.getItem('themeMode');
    
    function applyAutoTheme() {
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        html.setAttribute("data-theme", "dark");
      } else {
        html.setAttribute("data-theme", "light");
      }
    }
    if (stored === 'dark') {
      html.setAttribute("data-theme", "dark");        
    } else if (stored === 'light') {
      html.setAttribute("data-theme", "light");       
    } else {
      applyAutoTheme();                                
    }
    
    if (window.matchMedia) {
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      var onSchemeChange = function () {
        if (!localStorage.getItem('themeMode')) {
          applyAutoTheme();
        }
      };
      if (mq.addEventListener) { mq.addEventListener('change', onSchemeChange); }
      else if (mq.addListener) { mq.addListener(onSchemeChange); }
    }
  </script>

<script>
  
  
  (function () {
    function wrapTables() {
      var tables = document.querySelectorAll('.markdown table');
      for (var i = 0; i < tables.length; i++) {
        var t = tables[i];
        if (t.closest('.table-scroll') || (t.parentElement && t.parentElement.classList.contains('highlight'))) continue;
        var w = document.createElement('div');
        w.className = 'table-scroll';
        t.parentNode.insertBefore(w, t);
        w.appendChild(t);
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', wrapTables);
    } else {
      wrapTables();
    }
  })();
</script>

<script async="async">
    var html = document.documentElement;
    var switcher = document.getElementsByClassName('js-toggle')[0];
    if(typeof(Storage) !== 'undefined') {
        if (localStorage.getItem('themeMode') == 'dark' || document.documentElement.getAttribute('data-theme') == 'dark') {
            switcher.classList.add('js-toggle--checked');
        }
        switcher.classList.add('js-toggle--focus');
    }
    
    switcher.addEventListener("click", function() {
            this.classList.toggle('js-toggle--checked');
            this.classList.add('js-toggle--focus');
            
            if (this.classList.contains('js-toggle--checked')) {
                html.setAttribute("data-theme","dark");
                
                localStorage.setItem('themeMode', 'dark');
            } else {
                html.setAttribute("data-theme","light");
                localStorage.setItem('themeMode', 'light');
            }
        })
</script>
