name: Deploy《LeetCode-Cookbook》

on:
  push:
    branches:
      - master  # 只在master上push触发部署
      - add_hugo
    paths-ignore:   # 下列文件的变更不触发部署，可以自行添加
      - README.md
      - LICENSE

jobs:
  deploy:

    runs-on: ubuntu-latest   # 使用ubuntu系统镜像运行自动化脚本

    steps:  # 自动化步骤
    - uses: actions/checkout@v5   # 第一步，下载代码仓库
      with:
        fetch-depth: 0   # config.toml 里 enableGitInfo = true，需要完整 git 历史，否则取不到每页“最后修改”信息

    - name: Setup Hugo  # 第二步，安装 hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: '0.74.3'
        extended: true   # 关键修复：主题用 resources.ToCSS 编译 book.scss，必须用 extended 版，否则 build 直接报错

    - name: Build  # 第三步，编译 hugo
      run: |
        cd ./website
        hugo -D --minify

    - name: Deploy to Server  # 第四步，rsync推文件
      uses: appleboy/ssh-action@v1.0.3  # 升级旧的 v0.1.3（2020 年版本，镜像老旧易失败）
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.DEPLOY_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          rsync -avz --delete --exclude='*.pyc' ./website/public/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SERVER_DESTINATION }}
